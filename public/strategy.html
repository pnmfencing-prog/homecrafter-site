<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategy — PNM Fencing CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--midnight:#1e1845;--midnight-light:#2a2260;--gold:#c4aa6a;--cream:#faf9f6;--cream-dark:#f0ede6;--text:#2d2d2d;--muted:#6b6b6b;--green:#2d8a4e;--red:#c0392b;--blue:#2563eb;--orange:#d97706}body{font-family:Montserrat,sans-serif;background:var(--cream);color:var(--text);line-height:1.5}.header{background:linear-gradient(135deg,var(--midnight),var(--midnight-light));padding:1.4rem;text-align:center;position:relative}.logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;letter-spacing:.2em;color:var(--gold)}.header-sub{font-size:.65rem;letter-spacing:.15em;color:rgba(255,255,255,.5);text-transform:uppercase;margin-top:.2rem}.nav{display:flex;gap:1rem 1.25rem;justify-content:center;margin-top:.8rem;flex-wrap:wrap}.nav a{color:rgba(255,255,255,.6);text-decoration:none;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}.nav a.active,.nav a:hover{color:var(--gold)}.portal-home{position:absolute;top:.85rem;left:.9rem;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(196,170,106,.35);border-radius:999px;color:var(--gold);text-decoration:none;font-size:1rem;background:rgba(255,255,255,.06)}.wrap{max-width:1250px;margin:0 auto;padding:1.2rem}.toolbar{display:flex;gap:.65rem;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:1rem}.btn{border:0;border-radius:8px;padding:.62rem .95rem;font-family:Montserrat,sans-serif;font-size:.72rem;font-weight:800;cursor:pointer}.btn-primary{background:var(--midnight);color:var(--gold)}.btn-outline{background:#fff;color:var(--midnight);border:1px solid #e0ddd6}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1rem}.card{background:#fff;border:1px solid #e8e3d9;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:1rem}.card h2{font-family:'Cormorant Garamond',serif;color:var(--midnight);font-size:1.45rem;margin-bottom:.4rem}.metric{text-align:center}.metric strong{display:block;font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--midnight);line-height:1}.metric span{font-size:.62rem;color:var(--muted);font-weight:800;letter-spacing:.08em;text-transform:uppercase}.two{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.idea{border-left:4px solid var(--gold);padding:.75rem;background:var(--cream);border-radius:10px;margin-bottom:.65rem}.idea.unique{border-left-color:var(--purple,#7c3aed)}.idea .mode{font-size:.55rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}.idea h3{font-size:.9rem;color:var(--midnight);margin:.1rem 0}.idea p{font-size:.76rem;color:var(--muted)}.list{display:flex;flex-direction:column;gap:.5rem}.row{display:flex;justify-content:space-between;gap:.8rem;padding:.55rem .65rem;background:var(--cream);border-radius:8px;font-size:.76rem}.row strong{color:var(--midnight)}.lesson{padding:.65rem .75rem;border-radius:9px;background:#fff;border:1px solid #eee;font-size:.78rem}.summary{white-space:pre-line;background:var(--midnight);color:#fff;border-radius:12px;padding:1rem;font-size:.78rem;line-height:1.7}.summary strong{color:var(--gold)}.saved{font-size:.74rem;color:var(--muted);padding:.5rem 0;border-bottom:1px solid #eee}.saved:last-child{border-bottom:0}.small{font-size:.7rem;color:var(--muted)}@media(max-width:900px){.grid,.two{grid-template-columns:1fr}.header{padding:1.25rem .9rem 1.35rem}.portal-home{top:.7rem;left:.7rem;width:30px;height:30px}.logo{font-size:1.55rem}.nav{display:grid;grid-template-columns:repeat(3,max-content);gap:.55rem 1.05rem}.nav a{font-size:.66rem}}
</style>
</head>
<body>
<div class="header"><a class="portal-home" href="/calendar.html">⌂</a><div class="logo">PNM FENCING</div><div class="header-sub">CRM Strategy & Learning</div><div class="nav"><a href="/crm.html">Sales Board</a><a href="/calendar.html">Calendar</a><a href="/proposals.html">Proposals</a><a href="/campaigns.html">Campaigns</a><a href="/imports.html">Imports</a><a href="/strategy.html" class="active">Strategy</a></div></div>
<div class="wrap">
  <div class="toolbar"><div><h1 style="font-family:Cormorant Garamond,serif;color:var(--midnight);font-size:1.8rem">Communication Intelligence</h1><div class="small">Analyzes CRM SMS, email, and dedicated chat threads so the business can learn from real conversations.</div></div><div><button class="btn btn-outline" onclick="loadStrategy()">Refresh</button> <button class="btn btn-primary" onclick="storeLearning()">Analyze & Store Learning</button></div></div>
  <div id="content"><div class="card">Loading strategy analysis...</div></div>
</div>
<script>
var ADMIN_TOKEN=localStorage.getItem('hc_admin_token')||'hc-admin-2026';
function api(method,body){var opts={method:method||'GET',headers:{Authorization:'Bearer '+ADMIN_TOKEN}};if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body)}return opts}
function esc(v){return String(v||'').replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]})}
function metric(label,value){return '<div class="card metric"><strong>'+esc(value)+'</strong><span>'+esc(label)+'</span></div>'}
function render(data){var m=data.metrics||{};var html='<div class="grid">'+metric('Leads analyzed',m.totalLeads||0)+metric('Messages',m.totalMessages||0)+metric('Avg response',m.avgResponseMinutes===null?'—':m.avgResponseMinutes+'m')+metric('Won rate',(m.wonRate||0)+'%')+'</div>';
html+='<div class="two"><div class="card"><h2>What customers are asking about</h2><div class="list">'+(data.customerQuestions||[]).map(function(q){return '<div class="row"><div><strong>'+esc(q.topic)+'</strong><br><span class="small">'+esc(q.lesson)+'</span></div><strong>'+esc(q.count)+'</strong></div>'}).join('')+'</div></div>';
html+='<div class="card"><h2>Communication lessons</h2><div class="list">'+(data.communicationLessons||[]).map(function(x){return '<div class="lesson">'+esc(x)+'</div>'}).join('')+'</div></div></div>';
html+='<div class="two" style="margin-top:1rem"><div class="card"><h2>Strategy ideas</h2>'+(data.strategyIdeas||[]).map(function(i){return '<div class="idea '+esc(i.mode)+'"><div class="mode">'+esc(i.mode)+'</div><h3>'+esc(i.title)+'</h3><p>'+esc(i.idea)+'</p><p style="margin-top:.35rem"><strong>Impact:</strong> '+esc(i.impact)+'</p></div>'}).join('')+'</div>';
html+='<div><div class="card" style="margin-bottom:1rem"><h2>Stored learning summary</h2><div class="summary">'+esc(data.learningSummary)+'</div></div><div class="card"><h2>Recent stored snapshots</h2>'+((data.saved||[]).length?data.saved.map(function(s){return '<div class="saved"><strong>'+esc(s.title)+'</strong><br>'+new Date(s.created_at).toLocaleString()+'</div>'}).join(''):'<div class="small">No stored snapshots yet.</div>')+'</div></div></div>';
html+='<div class="card" style="margin-top:1rem"><h2>Marketing & Customer Acquisition</h2><div class="small" style="margin-bottom:.75rem">Sustainable ways to bring more customers into the CRM: batch leads, SEO, social proof, referrals, Google channels, and reactivation.</div><div class="list">'+(data.marketingChannels||[]).map(function(c){return '<div class="idea"><div class="mode">'+esc(c.priority)+' priority</div><h3>'+esc(c.channel)+'</h3><p>'+esc(c.strategy)+'</p><p style="margin-top:.35rem"><strong>Next:</strong> '+esc(c.nextAction)+'</p></div>'}).join('')+'</div></div>';
html+='<div class="card" style="margin-top:1rem"><h2>Marketing experiments to test</h2><div class="two">'+(data.marketingExperiments||[]).map(function(x){return '<div class="lesson"><strong>'+esc(x.title)+'</strong><br><span class="small">Why: '+esc(x.why)+'</span><br><span class="small">Test: '+esc(x.test)+'</span></div>'}).join('')+'</div></div>';
html+='<div class="two" style="margin-top:1rem"><div class="card"><h2>Customer phrase patterns</h2><div class="list">'+(data.topCustomerPhrases||[]).map(function(p){return '<div class="row"><span>'+esc(p.phrase)+'</span><strong>'+p.count+'</strong></div>'}).join('')+'</div></div><div class="card"><h2>Outbound phrase patterns</h2><div class="list">'+(data.topOutboundPhrases||[]).map(function(p){return '<div class="row"><span>'+esc(p.phrase)+'</span><strong>'+p.count+'</strong></div>'}).join('')+'</div></div></div>';
document.getElementById('content').innerHTML=html}
function loadStrategy(){document.getElementById('content').innerHTML='<div class="card">Analyzing CRM communication...</div>';fetch('/api/crm-strategy',api('GET')).then(function(r){return r.json()}).then(render).catch(function(e){document.getElementById('content').innerHTML='<div class="card">Could not load strategy analysis: '+esc(e.message)+'</div>'})}
function storeLearning(){fetch('/api/crm-strategy',api('POST',{title:'CRM learning snapshot'})).then(function(r){return r.json()}).then(function(d){if(!d.success)throw new Error(d.error||'Save failed');render(Object.assign({},d.analysis,{saved:[d.insight]}));alert('Learning snapshot stored.')}).catch(function(e){alert('Could not store learning: '+e.message)})}
loadStrategy();
</script>
</body>
</html>
