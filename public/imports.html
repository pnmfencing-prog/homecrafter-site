<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imports — PNM Fencing CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--midnight:#1e1845;--midnight-light:#2a2260;--gold:#c4aa6a;--cream:#faf9f6;--cream-dark:#f0ede6;--text:#2d2d2d;--muted:#6b6b6b;--green:#2d8a4e;--red:#c0392b;--blue:#2563eb;--orange:#d97706}body{font-family:Montserrat,sans-serif;background:var(--cream);color:var(--text);line-height:1.5}.header{background:linear-gradient(135deg,var(--midnight),var(--midnight-light));padding:1.4rem;text-align:center;position:relative}.logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;letter-spacing:.2em;color:var(--gold)}.nav{display:flex;gap:1rem 1.25rem;justify-content:center;margin-top:.8rem;flex-wrap:wrap}.nav a{color:rgba(255,255,255,.6);text-decoration:none;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}.nav a.active{color:var(--gold)}.portal-home{position:absolute;top:.85rem;left:.9rem;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(196,170,106,.35);border-radius:999px;color:var(--gold);text-decoration:none;font-size:1rem;background:rgba(255,255,255,.06);transition:all .2s;z-index:3}.portal-home:hover{background:rgba(196,170,106,.16);transform:translateY(-1px)}.wrap{max-width:1300px;margin:0 auto;padding:1.2rem}.grid{display:grid;grid-template-columns:420px 1fr;gap:1rem}.card{background:#fff;border:1px solid #e8e3d9;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:1rem}.card h2{font-family:'Cormorant Garamond',serif;color:var(--midnight);font-size:1.45rem;margin-bottom:.25rem}.small{font-size:.68rem;color:var(--muted)}.form-group{margin-bottom:.8rem}.form-group label{display:block;font-size:.62rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.25rem}.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid #e0ddd6;border-radius:8px;padding:.55rem .7rem;font-family:Montserrat,sans-serif;font-size:.8rem}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}.btn{border:0;border-radius:8px;padding:.6rem .95rem;font-family:Montserrat,sans-serif;font-size:.72rem;font-weight:800;cursor:pointer}.btn-primary{background:var(--midnight);color:var(--gold)}.btn-outline{background:#fff;color:var(--midnight);border:1px solid #e0ddd6}.mutedbox{background:var(--cream);border:1px solid #e8e3d9;border-radius:10px;padding:.75rem;color:var(--muted);font-size:.75rem}.batch-list{display:flex;flex-direction:column;gap:.65rem}.batch-item{padding:.85rem;border:1px solid #e8e3d9;border-radius:12px;background:#fff;cursor:pointer}.batch-item.active{border-color:var(--gold);box-shadow:0 0 0 2px rgba(196,170,106,.18)}.batch-title{font-weight:900;color:var(--midnight);font-size:.88rem}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:.5rem;margin:.8rem 0}.stat{border-radius:10px;background:var(--cream);padding:.65rem;text-align:center}.stat strong{display:block;font-size:1.2rem;color:var(--midnight)}.table-wrap{overflow:auto;max-height:560px;border-radius:10px;border:1px solid #e8e3d9}.table{width:100%;border-collapse:collapse;background:#fff}.table th{position:sticky;top:0;background:var(--midnight);color:var(--gold);font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;text-align:left;padding:.55rem}.table td{padding:.52rem;border-bottom:1px solid var(--cream-dark);font-size:.72rem;white-space:nowrap}.pill{display:inline-block;border-radius:999px;padding:.12rem .45rem;font-size:.55rem;font-weight:900;text-transform:uppercase}.pill.imported{background:#f0fdf4;color:var(--green)}.pill.duplicate{background:#fffbeb;color:var(--orange)}.pill.skipped,.pill.error{background:#fef2f2;color:var(--red)}@media(max-width:900px){.header{padding:1.25rem .9rem 1.35rem}.portal-home{top:.7rem;left:.7rem;width:30px;height:30px;font-size:.9rem}.logo{font-size:1.55rem;letter-spacing:.18em}.nav{display:grid;grid-template-columns:repeat(3,max-content);justify-content:center;gap:.55rem 1.05rem;max-width:100%}.nav a{font-size:.66rem;letter-spacing:.07em}.grid{grid-template-columns:1fr}.form-row,.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="header"><a class="portal-home" href="/calendar.html" title="Portal home" aria-label="Portal home">&#8962;</a><div class="logo">PNM FENCING</div><div class="nav"><a href="/crm.html">Sales Board</a><a href="/calendar.html">Calendar</a><a href="/proposals.html">Proposals</a><a href="/campaigns.html">Campaigns</a><a class="active" href="/imports.html">Imports</a></div></div>
<div class="wrap">
  <div class="grid">
    <div class="card">
      <h2>Import Center</h2>
      <div class="small" style="margin-bottom:1rem">Upload each 30-day BatchLeads spreadsheet as a tracked batch. The CRM will dedupe, tag, and optionally assign a campaign.</div>
      <div class="form-group"><label>Spreadsheet CSV</label><input type="file" id="file" accept=".csv,text/csv"></div>
      <div class="form-group"><label>Batch Name</label><input id="batch-name" placeholder="BatchLeads Monmouth — June 2026"></div>
      <div class="form-row"><div class="form-group"><label>Market / Area</label><input id="market" placeholder="Monmouth County"></div><div class="form-group"><label>Source</label><input id="source" value="batchleads"></div></div>
      <div class="form-row"><div class="form-group"><label>Default Service</label><input id="service" value="Fencing"></div><div class="form-group"><label>Assign Campaign</label><select id="campaign"><option value="">None</option></select></div></div>
      <div class="form-group"><label>Search Criteria / Notes</label><textarea id="criteria" rows="3" placeholder="New homeowners, target ZIPs, property filters, etc."></textarea></div>
      <button class="btn btn-primary" id="importBtn" onclick="runImport()">Import Batch</button>
      <div id="uploadStatus" class="mutedbox" style="margin-top:.8rem">No file selected yet.</div>
    </div>
    <div>
      <div class="card" style="margin-bottom:1rem"><h2>Import History</h2><div id="batchList" class="batch-list"><div class="mutedbox">Loading…</div></div></div>
      <div class="card" id="batchDetail"><div class="mutedbox">Select an import batch to view rows.</div></div>
    </div>
  </div>
</div>
<script>
var ADMIN_TOKEN=localStorage.getItem('hc_admin_token')||'hc-admin-2026';var campaigns=[],batches=[],selectedBatchId=null;
function api(method,body){var opts={method:method||'GET',headers:{Authorization:'Bearer '+ADMIN_TOKEN}};if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body)}return opts}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function parseCSV(text){var rows=[],row=[],val='',q=false;for(var i=0;i<text.length;i++){var c=text[i],n=text[i+1];if(c==='"'&&q&&n==='"'){val+='"';i++;continue}if(c==='"'){q=!q;continue}if(c===','&&!q){row.push(val);val='';continue}if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(val);if(row.some(x=>String(x).trim()))rows.push(row);row=[];val='';continue}val+=c}row.push(val);if(row.some(x=>String(x).trim()))rows.push(row);if(rows.length<2)return[];var headers=rows[0].map(h=>String(h||'').trim());return rows.slice(1).map(r=>{var o={};headers.forEach((h,i)=>o[h||('Column '+(i+1))]=(r[i]||'').trim());return o})}
function loadCampaigns(){return fetch('/api/campaigns',api('GET')).then(r=>r.json()).then(d=>{campaigns=d.campaigns||[];document.getElementById('campaign').innerHTML='<option value="">None</option>'+campaigns.map(c=>'<option value="'+c.id+'">'+esc(c.name)+(c.source?' ('+esc(c.source)+')':'')+'</option>').join('')})}
function loadBatches(){fetch('/api/import-batches',api('GET')).then(r=>r.json()).then(d=>{batches=d.batches||[];renderBatches();if(!selectedBatchId&&batches[0])showBatch(batches[0].id)})}
function renderBatches(){document.getElementById('batchList').innerHTML=batches.map(b=>'<div class="batch-item '+(b.id===selectedBatchId?'active':'')+'" onclick="showBatch('+b.id+')"><div class="batch-title">'+esc(b.batch_name)+'</div><div class="small">'+new Date(b.created_at).toLocaleDateString()+' · '+esc(b.market||b.provider||'BatchLeads')+'</div><div class="small">'+b.imported_count+' imported · '+b.duplicate_count+' duplicates · '+b.skipped_count+' skipped · '+b.error_count+' errors</div>'+(b.campaign_name?'<span class="pill imported">'+esc(b.campaign_name)+'</span>':'')+'</div>').join('')||'<div class="mutedbox">No import batches yet.</div>'}
function showBatch(id){selectedBatchId=id;renderBatches();fetch('/api/import-batches?id='+id,api('GET')).then(r=>r.json()).then(d=>{if(d.error){document.getElementById('batchDetail').innerHTML='<div class="mutedbox">'+esc(d.error)+'</div>';return}var b=d.batch,rows=d.rows||[];document.getElementById('batchDetail').innerHTML='<h2>'+esc(b.batch_name)+'</h2><div class="small">'+esc([b.provider,b.market,b.source].filter(Boolean).join(' · '))+'</div><div class="stats"><div class="stat"><strong>'+b.total_rows+'</strong>Total</div><div class="stat"><strong>'+b.imported_count+'</strong>Imported</div><div class="stat"><strong>'+b.duplicate_count+'</strong>Duplicates</div><div class="stat"><strong>'+b.skipped_count+'</strong>Skipped</div><div class="stat"><strong>'+b.error_count+'</strong>Errors</div></div>'+(b.search_criteria?'<div class="mutedbox" style="margin-bottom:.8rem">'+esc(b.search_criteria)+'</div>':'')+'<div class="table-wrap"><table class="table"><tr><th>Row</th><th>Status</th><th>Name</th><th>Phone</th><th>Email</th><th>Address</th><th>CRM</th><th>Error</th></tr>'+rows.map(r=>'<tr><td>'+r.row_number+'</td><td><span class="pill '+esc(r.status)+'">'+esc(r.status)+'</span></td><td>'+esc(r.normalized_name)+'</td><td>'+esc(r.normalized_phone)+'</td><td>'+esc(r.normalized_email)+'</td><td>'+esc([r.normalized_address,r.normalized_city,r.normalized_state,r.normalized_zip].filter(Boolean).join(', '))+'</td><td>'+(r.lead_code?'<a href="/crm.html?lead='+(r.lead_id||r.duplicate_lead_id)+'">#'+esc(r.lead_code)+' '+esc(r.crm_customer_name)+'</a>':'')+'</td><td>'+esc(r.error)+'</td></tr>').join('')+'</table></div>'})}
function runImport(){var file=document.getElementById('file').files[0];if(!file){alert('Choose a CSV first.');return}var btn=document.getElementById('importBtn'),status=document.getElementById('uploadStatus');btn.disabled=true;btn.textContent='Importing…';status.textContent='Reading spreadsheet…';var reader=new FileReader();reader.onload=function(e){var rows=parseCSV(e.target.result);if(!rows.length){status.textContent='Could not read rows from this CSV.';btn.disabled=false;btn.textContent='Import Batch';return}var name=document.getElementById('batch-name').value||file.name.replace(/\.csv$/i,'');status.textContent='Importing '+rows.length+' rows…';fetch('/api/crm-import',api('POST',{rows:rows,filename:file.name,batch_name:name,provider:'BatchLeads',market:document.getElementById('market').value,source:document.getElementById('source').value,service_type:document.getElementById('service').value,search_criteria:document.getElementById('criteria').value,campaign_id:document.getElementById('campaign').value||null})).then(r=>r.json()).then(d=>{btn.disabled=false;btn.textContent='Import Batch';if(d.error){status.textContent=d.error;return}status.innerHTML='✅ Imported batch #'+d.batch_id+': '+d.imported+' imported, '+d.duplicate+' duplicates, '+d.skipped+' skipped, '+(d.errors||[]).length+' sample errors.';selectedBatchId=d.batch_id;loadBatches();showBatch(d.batch_id)}).catch(err=>{btn.disabled=false;btn.textContent='Import Batch';status.textContent='Import failed: '+err.message})};reader.readAsText(file)}
document.getElementById('file').addEventListener('change',function(){var f=this.files[0];document.getElementById('uploadStatus').textContent=f?('Ready: '+f.name):'No file selected yet.';if(f&&!document.getElementById('batch-name').value)document.getElementById('batch-name').value=f.name.replace(/\.csv$/i,'')});
loadCampaigns();loadBatches();
</script>
</body>
</html>
