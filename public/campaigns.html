<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaigns — PNM Fencing CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--midnight:#1e1845;--midnight-light:#2a2260;--gold:#c4aa6a;--cream:#faf9f6;--cream-dark:#f0ede6;--text:#2d2d2d;--muted:#6b6b6b;--green:#2d8a4e;--red:#c0392b;--blue:#2563eb;--orange:#d97706}body{font-family:Montserrat,sans-serif;background:var(--cream);color:var(--text);line-height:1.5}.header{background:linear-gradient(135deg,var(--midnight),var(--midnight-light));padding:1.4rem;text-align:center}.logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;letter-spacing:.2em;color:var(--gold)}.nav{display:flex;gap:1.5rem;justify-content:center;margin-top:.8rem}.nav a{color:rgba(255,255,255,.6);text-decoration:none;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}.nav a.active{color:var(--gold)}.wrap{max-width:1300px;margin:0 auto;padding:1.2rem}.toolbar,.card{background:#fff;border:1px solid #e8e3d9;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.toolbar{display:flex;gap:.7rem;align-items:center;justify-content:space-between;padding:1rem;margin-bottom:1rem;flex-wrap:wrap}.btn{border:0;border-radius:8px;padding:.55rem .9rem;font-family:Montserrat,sans-serif;font-size:.72rem;font-weight:700;cursor:pointer}.btn-primary{background:var(--midnight);color:var(--gold)}.btn-outline{background:#fff;color:var(--midnight);border:1px solid #e0ddd6}.btn-red{background:var(--red);color:#fff}.grid{display:grid;grid-template-columns:300px 1fr;gap:1rem}.campaign-list{display:flex;flex-direction:column;gap:.65rem}.campaign-item{padding:.85rem;border:1px solid #e8e3d9;border-radius:12px;background:#fff;cursor:pointer}.campaign-item.active{border-color:var(--gold);box-shadow:0 0 0 2px rgba(196,170,106,.18)}.campaign-name{font-weight:800;color:var(--midnight);font-size:.9rem}.small{font-size:.68rem;color:var(--muted)}.pill{display:inline-block;border-radius:999px;padding:.12rem .45rem;background:#eff6ff;color:var(--blue);font-size:.56rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-top:.35rem}.card{padding:1rem}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}.form-group{margin-bottom:.8rem}.form-group label{display:block;font-size:.62rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.25rem}.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid #e0ddd6;border-radius:8px;padding:.55rem .7rem;font-family:Montserrat,sans-serif;font-size:.8rem}.form-group textarea{min-height:86px;resize:vertical}.steps{display:flex;flex-direction:column;gap:.85rem;margin-top:1rem}.step{border:1px solid #e8e3d9;border-left:4px solid var(--gold);border-radius:12px;background:#fff;padding:.9rem}.step-head{display:flex;justify-content:space-between;gap:.7rem;align-items:center;margin-bottom:.7rem;flex-wrap:wrap}.step-title{font-weight:900;color:var(--midnight)}.lead-table{width:100%;border-collapse:collapse;margin-top:.7rem;background:#fff;border-radius:10px;overflow:hidden}.lead-table th{background:var(--midnight);color:var(--gold);font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;text-align:left;padding:.55rem}.lead-table td{padding:.55rem;border-bottom:1px solid var(--cream-dark);font-size:.75rem}.mutedbox{background:var(--cream);border:1px solid #e8e3d9;border-radius:10px;padding:.75rem;color:var(--muted);font-size:.75rem}@media(max-width:850px){.grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.toolbar{align-items:stretch}.toolbar>*{width:100%}}
</style>
</head>
<body>
<div class="header"><div class="logo">PNM FENCING</div><div class="nav"><a href="/crm.html">Sales Board</a><a href="/calendar.html">Calendar</a><a href="/proposals.html">Proposals</a><a class="active" href="/campaigns.html">Campaigns</a></div></div>
<div class="wrap">
  <div class="toolbar"><div><strong>Automated Campaigns</strong><div class="small">Edit preprogrammed messages, send days, and which leads are assigned.</div></div><button class="btn btn-primary" onclick="newCampaign()">+ New Campaign</button></div>
  <div class="grid">
    <div><div class="campaign-list" id="campaignList"></div></div>
    <div class="card" id="detail"><div class="mutedbox">Loading campaigns…</div></div>
  </div>
</div>
<script>
var ADMIN_TOKEN=localStorage.getItem('hc_admin_token')||'hc-admin-2026';var campaigns=[],messages=[],leads=[],selectedId=null;
function api(method,body){var opts={method:method||'GET',headers:{Authorization:'Bearer '+ADMIN_TOKEN}};if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body)}return opts}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function load(){fetch('/api/campaigns?includeLeads=1',api('GET')).then(r=>r.json()).then(d=>{campaigns=d.campaigns||[];messages=d.messages||[];leads=d.leads||[];if(!selectedId&&campaigns[0])selectedId=campaigns[0].id;render()})}
function render(){document.getElementById('campaignList').innerHTML=campaigns.map(c=>'<div class="campaign-item '+(c.id===selectedId?'active':'')+'" onclick="selectedId='+c.id+';render()"><div class="campaign-name">'+esc(c.name)+'</div><div class="small">'+esc(c.source||'any source')+' · '+(c.assigned_count||0)+' active assigned</div>'+(c.is_default?'<span class="pill">Default</span>':'')+(!c.is_active?'<span class="pill" style="background:#fef2f2;color:#c0392b">Inactive</span>':'')+'</div>').join('')||'<div class="mutedbox">No campaigns yet.</div>';renderDetail()}
function renderDetail(){var c=campaigns.find(x=>x.id===selectedId);if(!c){document.getElementById('detail').innerHTML='<div class="mutedbox">Select or create a campaign.</div>';return}var steps=messages.filter(m=>m.campaign_id===c.id).sort((a,b)=>a.step_number-b.step_number);var assigned=leads.filter(l=>l.campaign_id===c.id);document.getElementById('detail').innerHTML='<div class="form-row"><div class="form-group"><label>Campaign Name</label><input id="c-name" value="'+esc(c.name)+'"></div><div class="form-group"><label>Source</label><input id="c-source" value="'+esc(c.source||'')+'" placeholder="angi, website, manual"></div></div><div class="form-group"><label>Description</label><input id="c-desc" value="'+esc(c.description||'')+'"></div><div style="display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem"><label class="small"><input type="checkbox" id="c-active" '+(c.is_active?'checked':'')+'> Active</label><label class="small"><input type="checkbox" id="c-default" '+(c.is_default?'checked':'')+'> Default for source</label><button class="btn btn-primary" onclick="saveCampaign('+c.id+')">Save Campaign</button><button class="btn btn-outline" onclick="addStep('+c.id+')">+ Add Message</button></div><div class="mutedbox">Timing is by day number from campaign start. Day 0 sends immediately. Email follows SMS by about 5 minutes when channel is Both.</div><div class="steps">'+steps.map(stepHtml).join('')+'</div><div style="margin-top:1.25rem;border-top:1px solid var(--cream-dark);padding-top:1rem"><h3 style="font-family:Cormorant Garamond,serif;color:var(--midnight);font-size:1.35rem">Assign Leads</h3><div class="form-row"><div class="form-group"><label>Lead</label><select id="assign-lead"><option value="">Choose lead…</option>'+leads.map(l=>'<option value="'+l.id+'">#'+esc(l.lead_code||l.id)+' — '+esc(l.customer_name||'Unknown')+' ('+esc(l.source||'')+')</option>').join('')+'</select></div><div class="form-group"><label>&nbsp;</label><button class="btn btn-primary" onclick="assignLead('+c.id+')">Assign to Campaign</button></div></div><table class="lead-table"><tr><th>Lead</th><th>Source</th><th>Step</th><th>Status</th><th></th></tr>'+assigned.map(l=>'<tr><td>#'+esc(l.lead_code||l.id)+' — '+esc(l.customer_name||'Unknown')+'</td><td>'+esc(l.source||'')+'</td><td>'+esc(l.outreach_count||0)+'</td><td>'+(l.customer_responded?'Responded':l.outreach_paused?'Paused':esc(l.status))+'</td><td><button class="btn btn-outline" onclick="unassignLead('+l.id+')">Remove</button></td></tr>').join('')+'</table></div>'}
function stepHtml(s){return '<div class="step"><div class="step-head"><div class="step-title">Message #'+s.step_number+'</div><div style="display:flex;gap:.45rem;align-items:center"><span class="small">Day</span><input id="day-'+s.id+'" type="number" min="0" value="'+s.send_day+'" style="width:70px;padding:.35rem;border:1px solid #ddd;border-radius:8px"><select id="channel-'+s.id+'" style="padding:.38rem;border:1px solid #ddd;border-radius:8px"><option value="both" '+(s.channel==='both'?'selected':'')+'>Both</option><option value="sms" '+(s.channel==='sms'?'selected':'')+'>SMS only</option><option value="email" '+(s.channel==='email'?'selected':'')+'>Email only</option></select><label class="small"><input id="active-'+s.id+'" type="checkbox" '+(s.is_active?'checked':'')+'> Active</label></div></div><div class="form-group"><label>SMS Body</label><textarea id="sms-'+s.id+'">'+esc(s.sms_body||'')+'</textarea></div><div class="form-group"><label>Email Subject</label><input id="subject-'+s.id+'" value="'+esc(s.email_subject||'')+'"></div><div class="form-group"><label>Email Body</label><textarea id="email-'+s.id+'">'+esc(s.email_body||'')+'</textarea></div><div style="display:flex;gap:.5rem;justify-content:flex-end"><button class="btn btn-outline" onclick="deleteStep('+s.id+')">Delete</button><button class="btn btn-primary" onclick="saveStep('+s.campaign_id+','+s.step_number+','+s.id+')">Save Message</button></div></div>'}
function post(body){return fetch('/api/campaigns',api('POST',body)).then(r=>r.json()).then(d=>{if(d.error)alert(d.error);load();return d})}
function newCampaign(){var name=prompt('Campaign name?');if(name)post({action:'create_campaign',name:name,source:'angi',description:''})}
function saveCampaign(id){post({action:'update_campaign',id:id,name:document.getElementById('c-name').value,description:document.getElementById('c-desc').value,source:document.getElementById('c-source').value,is_active:document.getElementById('c-active').checked,is_default:document.getElementById('c-default').checked})}
function saveStep(campaignId,stepNumber,id){post({action:'upsert_message',campaign_id:campaignId,step_number:stepNumber,send_day:Number(document.getElementById('day-'+id).value||0),channel:document.getElementById('channel-'+id).value,sms_body:document.getElementById('sms-'+id).value,email_subject:document.getElementById('subject-'+id).value,email_body:document.getElementById('email-'+id).value,is_active:document.getElementById('active-'+id).checked})}
function addStep(campaignId){var existing=messages.filter(m=>m.campaign_id===campaignId).map(m=>m.step_number);var next=existing.length?Math.max.apply(null,existing)+1:1;post({action:'upsert_message',campaign_id:campaignId,step_number:next,send_day:0,channel:'both',sms_body:'',email_subject:'Following up',email_body:'',is_active:true})}
function deleteStep(id){if(confirm('Delete this campaign message?'))post({action:'delete_message',id:id})}
function assignLead(campaignId){var leadId=document.getElementById('assign-lead').value;if(leadId)post({action:'assign_lead',lead_id:Number(leadId),campaign_id:campaignId})}
function unassignLead(leadId){post({action:'assign_lead',lead_id:leadId,campaign_id:null})}
load();
</script>
</body>
</html>
