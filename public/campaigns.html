<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaigns — PNM Fencing CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--midnight:#1e1845;--midnight-light:#2a2260;--gold:#c4aa6a;--cream:#faf9f6;--cream-dark:#f0ede6;--text:#2d2d2d;--muted:#6b6b6b;--green:#2d8a4e;--red:#c0392b;--blue:#2563eb;--orange:#d97706}body{font-family:Montserrat,sans-serif;background:var(--cream);color:var(--text);line-height:1.5}.header{background:linear-gradient(135deg,var(--midnight),var(--midnight-light));padding:1.4rem;text-align:center;position:relative}.logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;letter-spacing:.2em;color:var(--gold)}.nav{display:flex;gap:1rem 1.25rem;justify-content:center;margin-top:.8rem;flex-wrap:wrap}.nav a{color:rgba(255,255,255,.6);text-decoration:none;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}.nav a.active{color:var(--gold)}.portal-home{position:absolute;top:.85rem;left:.9rem;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(196,170,106,.35);border-radius:999px;color:var(--gold);text-decoration:none;font-size:1rem;background:rgba(255,255,255,.06);transition:all .2s;z-index:3}.portal-home:hover{background:rgba(196,170,106,.16);transform:translateY(-1px)}.wrap{max-width:1300px;margin:0 auto;padding:1.2rem}.toolbar,.card{background:#fff;border:1px solid #e8e3d9;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.toolbar{display:flex;gap:.7rem;align-items:center;justify-content:space-between;padding:1rem;margin-bottom:1rem;flex-wrap:wrap}.btn{border:0;border-radius:8px;padding:.55rem .9rem;font-family:Montserrat,sans-serif;font-size:.72rem;font-weight:700;cursor:pointer}.btn-primary{background:var(--midnight);color:var(--gold)}.btn-outline{background:#fff;color:var(--midnight);border:1px solid #e0ddd6}.btn-red{background:var(--red);color:#fff}.grid{display:grid;grid-template-columns:300px 1fr;gap:1rem}.campaign-list{display:flex;flex-direction:column;gap:.65rem}.campaign-item{padding:.85rem;border:1px solid #e8e3d9;border-radius:12px;background:#fff;cursor:pointer}.campaign-item.active{border-color:var(--gold);box-shadow:0 0 0 2px rgba(196,170,106,.18)}.campaign-name{font-weight:800;color:var(--midnight);font-size:.9rem}.small{font-size:.68rem;color:var(--muted)}.pill{display:inline-block;border-radius:999px;padding:.12rem .45rem;background:#eff6ff;color:var(--blue);font-size:.56rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-top:.35rem}.card{padding:1rem}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}.form-group{margin-bottom:.8rem}.form-group label{display:block;font-size:.62rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.25rem}.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid #e0ddd6;border-radius:8px;padding:.55rem .7rem;font-family:Montserrat,sans-serif;font-size:.8rem}.form-group textarea{min-height:86px;resize:vertical}.steps{display:flex;flex-direction:column;gap:.85rem;margin-top:1rem}.step{border:1px solid #e8e3d9;border-left:4px solid var(--gold);border-radius:12px;background:#fff;padding:.9rem}.step-head{display:flex;justify-content:space-between;gap:.7rem;align-items:center;margin-bottom:.7rem;flex-wrap:wrap}.step-title{font-weight:900;color:var(--midnight)}.lead-table{width:100%;border-collapse:collapse;margin-top:.7rem;background:#fff;border-radius:10px;overflow:hidden}.lead-table th{background:var(--midnight);color:var(--gold);font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;text-align:left;padding:.55rem}.lead-table td{padding:.55rem;border-bottom:1px solid var(--cream-dark);font-size:.75rem}.mutedbox{background:var(--cream);border:1px solid #e8e3d9;border-radius:10px;padding:.75rem;color:var(--muted);font-size:.75rem}.lead-picker{border:1px solid #e0ddd6;border-radius:10px;background:#fff;max-height:280px;overflow:auto}.lead-pick-row{display:flex;gap:.55rem;align-items:flex-start;padding:.55rem .65rem;border-bottom:1px solid var(--cream-dark);font-size:.76rem;cursor:pointer}.lead-pick-row:last-child{border-bottom:0}.lead-pick-row input{width:auto;margin-top:.12rem;flex:0 0 auto}.lead-pick-row:hover{background:var(--cream)}.lead-pick-title{font-weight:700;color:var(--midnight)}.lead-pick-meta{font-size:.64rem;color:var(--muted)}.assign-actions{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-top:.55rem}.assign-count{font-size:.68rem;color:var(--muted);font-weight:700}.campaign-filter-tabs,.stage-filter-tabs{display:flex;gap:.45rem;flex-wrap:wrap;margin:.45rem 0 .6rem;padding:.35rem;border:1px solid #e8e3d9;border-radius:12px;background:var(--cream)}.campaign-filter-tabs .btn.active{background:#eff6ff;color:var(--blue);border-color:#bfdbfe}.stage-filter-tabs .btn.active{background:var(--midnight);color:var(--gold);border-color:var(--midnight)}.tabs{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}.tab{border:1px solid #e0ddd6;background:#fff;color:var(--midnight);border-radius:999px;padding:.5rem .8rem;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;cursor:pointer}.tab.active{background:var(--midnight);color:var(--gold);border-color:var(--midnight)}@media(max-width:850px){.header{padding:1.25rem .9rem 1.35rem}.portal-home{top:.7rem;left:.7rem;width:30px;height:30px;font-size:.9rem}.logo{font-size:1.55rem;letter-spacing:.18em}.nav{display:grid;grid-template-columns:repeat(3,max-content);justify-content:center;gap:.55rem 1.05rem;max-width:100%}.nav a{font-size:.66rem;letter-spacing:.07em}.grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.toolbar{align-items:stretch}.toolbar>*{width:100%}}
</style>
</head>
<body>
<div class="header"><a class="portal-home" href="/calendar.html" title="Portal home" aria-label="Portal home">&#8962;</a><div class="logo">PNM FENCING</div><div class="nav"><a href="/crm.html">Sales Board</a><a href="/calendar.html">Calendar</a><a href="/proposals.html">Proposals</a><a class="active" href="/campaigns.html">Campaigns</a><a href="/imports.html">Imports</a>
    <a href="/strategy.html">Strategy</a></div></div>
<div class="wrap">
  <div class="toolbar"><div><strong>Automated Campaigns</strong><div class="small">Edit preprogrammed messages, send days, and which leads are assigned.</div></div><button class="btn btn-primary" onclick="newCampaign()">+ New Campaign</button></div>
  <div class="grid">
    <div><div class="campaign-list" id="campaignList"></div></div>
    <div class="card" id="detail"><div class="mutedbox">Loading campaigns…</div></div>
  </div>
</div>
<script>
var ADMIN_TOKEN=localStorage.getItem('hc_admin_token')||'hc-admin-2026';var campaigns=[],messages=[],leads=[],leadCounts=null,nonresponders=[],selectedId=null,activeTab='edit',assignCampaignFilter='all',assignStageFilters=[];var STAGE_FILTERS=[{key:'new',label:'New'},{key:'contacted',label:'Contacted'},{key:'quoted',label:'Quoted'},{key:'scheduled',label:'Scheduled'},{key:'promising_reply',label:'Promising'},{key:'neutral_reply',label:'Neutral'},{key:'won',label:'Won'},{key:'sold',label:'Sold'},{key:'lost',label:'Lost'}];
function api(method,body){var opts={method:method||'GET',headers:{Authorization:'Bearer '+ADMIN_TOKEN}};if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body)}return opts}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function load(){fetch('/api/campaigns?includeLeads=1&includeNonresponders=1',api('GET')).then(r=>r.json()).then(d=>{campaigns=d.campaigns||[];messages=d.messages||[];leads=d.leads||[];leadCounts=d.leadCounts||null;nonresponders=d.nonresponders||[];if(!selectedId&&campaigns[0])selectedId=campaigns[0].id;render()})}
function render(){document.getElementById('campaignList').innerHTML=campaigns.map(c=>'<div class="campaign-item '+(c.id===selectedId?'active':'')+'" onclick="selectedId='+c.id+';render()"><div class="campaign-name">'+esc(c.name)+'</div><div class="small">'+esc(c.source||'any source')+' · '+(c.assigned_count||0)+' assigned'+(c.active_assigned_count!=null?' · '+esc(c.active_assigned_count)+' active':'')+'</div>'+(c.is_default?'<span class="pill">Default</span>':'')+(!c.is_active?'<span class="pill" style="background:#fef2f2;color:#c0392b">Inactive</span>':'')+'</div>').join('')||'<div class="mutedbox">No campaigns yet.</div>';renderDetail()}
function sourceOptions(selected){var sources=['angi','website','manual','batchleads','google','referral'];var html='<option value="">Any source</option>';sources.forEach(src=>{html+='<option value="'+src+'" '+(String(selected||'')===src?'selected':'')+'>'+src.charAt(0).toUpperCase()+src.slice(1)+'</option>'});if(selected&&sources.indexOf(String(selected))<0)html+='<option value="'+esc(selected)+'" selected>'+esc(selected)+'</option>';return html}
function tabHtml(){return '<div class="tabs"><button class="tab '+(activeTab==='edit'?'active':'')+'" onclick="activeTab=\'edit\';renderDetail()">Edit Campaign</button><button class="tab '+(activeTab==='no-replies'?'active':'')+'" onclick="activeTab=\'no-replies\';renderDetail()">No Replies ('+nonresponders.length+')</button></div>'}
function campaignSelect(selected){var html='<select id="readd-campaign" style="max-width:300px">';campaigns.forEach(c=>{html+='<option value="'+c.id+'" '+(c.id===selected?'selected':'')+'>'+esc(c.name)+'</option>'});return html+'</select>'}
function stageFilteredLeads(){if(!assignStageFilters.length||assignStageFilters.length>=STAGE_FILTERS.length)return leads.slice();return leads.filter(l=>assignStageFilters.indexOf(String(l.status||'new'))>=0)}
function countMapValue(map,key){return Number((map||{})[key]||0)}
function selectedStageKeys(){return (!assignStageFilters.length||assignStageFilters.length>=STAGE_FILTERS.length)?STAGE_FILTERS.map(st=>st.key):assignStageFilters.slice()}
function exactStageTotal(){if(!leadCounts)return leads.length;if(!assignStageFilters.length||assignStageFilters.length>=STAGE_FILTERS.length)return Number(leadCounts.total||0);return selectedStageKeys().reduce((sum,key)=>sum+countMapValue(leadCounts.by_status,key),0)}
function stageCount(stage){return leadCounts?countMapValue(leadCounts.by_status,stage):leads.filter(l=>String(l.status||'new')===stage).length}
function stageFilterTabs(){var allActive=!assignStageFilters.length||assignStageFilters.length>=STAGE_FILTERS.length;var html='<div class="stage-filter-tabs"><button class="btn btn-outline '+(allActive?'active':'')+'" onclick="setAssignStageFilter(\'all\')">All ('+exactStageTotal()+')</button>';STAGE_FILTERS.forEach(st=>{var active=!allActive&&assignStageFilters.indexOf(st.key)>=0;html+='<button class="btn btn-outline '+(active?'active':'')+'" onclick="setAssignStageFilter(\''+st.key+'\')">'+esc(st.label)+' ('+stageCount(st.key)+')</button>'});return html+'</div>'}
function setAssignStageFilter(stage){if(stage==='all'){assignStageFilters=[];renderDetail();return}var i=assignStageFilters.indexOf(stage);if(i>=0)assignStageFilters.splice(i,1);else assignStageFilters.push(stage);if(assignStageFilters.length>=STAGE_FILTERS.length)assignStageFilters=[];renderDetail()}
function hasActiveCampaign(l){return !!l.campaign_id&&!l.campaign_completed&&l.customer_responded!==true&&l.outreach_paused!==true}
function campaignFilterCount(filter){if(!leadCounts)return stageFilteredLeads().filter(l=>filter==='active_campaign'?hasActiveCampaign(l):(filter==='campaign_completed'?l.campaign_completed&&l.status!=='lost':(filter==='no_campaign'?!l.campaign_id&&!l.campaign_completed:true))).length;if(filter==='all')return exactStageTotal();var allActive=!assignStageFilters.length||assignStageFilters.length>=STAGE_FILTERS.length;if(allActive)return Number(leadCounts[filter]||0);var map=filter==='active_campaign'?leadCounts.active_campaign_by_status:(filter==='campaign_completed'?leadCounts.campaign_completed_by_status:leadCounts.no_campaign_by_status);return selectedStageKeys().reduce((sum,key)=>sum+countMapValue(map,key),0)}
function assignCampaignFilterTabs(){return '<div class="campaign-filter-tabs"><button class="btn btn-outline '+(assignCampaignFilter==='all'?'active':'')+'" onclick="setAssignCampaignFilter(\'all\')">All Leads ('+campaignFilterCount('all')+')</button><button class="btn btn-outline '+(assignCampaignFilter==='active_campaign'?'active':'')+'" onclick="setAssignCampaignFilter(\'active_campaign\')">Active Campaign ('+campaignFilterCount('active_campaign')+')</button><button class="btn btn-outline '+(assignCampaignFilter==='campaign_completed'?'active':'')+'" onclick="setAssignCampaignFilter(\'campaign_completed\')">Campaign Completed ('+campaignFilterCount('campaign_completed')+')</button><button class="btn btn-outline '+(assignCampaignFilter==='no_campaign'?'active':'')+'" onclick="setAssignCampaignFilter(\'no_campaign\')">No Campaign Assigned ('+campaignFilterCount('no_campaign')+')</button></div>'}
function setAssignCampaignFilter(filter){assignCampaignFilter=filter;renderDetail()}
function filteredAssignLeads(){return stageFilteredLeads().filter(l=>assignCampaignFilter==='active_campaign'?hasActiveCampaign(l):(assignCampaignFilter==='campaign_completed'?l.campaign_completed&&l.status!=='lost':(assignCampaignFilter==='no_campaign'?!l.campaign_id&&!l.campaign_completed:true)))}
function loadedAssignCountNotice(shown){var exact=campaignFilterCount(assignCampaignFilter);if(!leadCounts||exact<=shown)return '';return '<div class="mutedbox" style="margin:.55rem 0">Showing '+shown+' loaded lead(s) out of '+exact+' matching this filter. Counts are exact; the picker is intentionally capped so the page stays fast.</div>'}
function renderNoReplies(c){
  var rows=nonresponders.map(l=>'<label class="lead-pick-row no-reply-row"><input type="checkbox" class="no-reply-check" value="'+l.lead_id+'" onchange="updateNoReplyCount()"><span><span class="lead-pick-title">#'+esc(l.lead_code||l.lead_id)+' — '+esc(l.customer_name||'Unknown')+'</span><span class="lead-pick-meta"> '+esc([l.campaign_name,l.source,l.customer_phone,l.customer_email].filter(Boolean).join(' · '))+' · finished '+esc(l.campaign_sms_steps||0)+' step(s) · last touch '+esc(l.days_since_last_outreach||0)+' day(s) ago</span></span></label>').join('')||'<div class="mutedbox">No completed non-repliers right now.</div>';
  document.getElementById('detail').innerHTML=tabHtml()+'<h3 style="font-family:Cormorant Garamond,serif;color:var(--midnight);font-size:1.45rem">Leads That Did Not Reply</h3><div class="mutedbox" style="margin:.5rem 0 .9rem">These are leads that completed every active SMS/email step in a campaign, have not replied, and have had at least 1 day since the final outreach. Select them one by one or select all, then re-add them to any campaign.</div><div class="form-row"><div class="form-group"><label>Search No-Replies</label><input id="no-reply-search" placeholder="Search by name, campaign, source, phone, or email..." oninput="filterNoReplies()"></div><div class="form-group"><label>Re-add Selected To Campaign</label>'+campaignSelect(c.id)+'</div></div><div class="assign-actions" style="margin-bottom:.7rem"><button class="btn btn-outline" onclick="selectVisibleNoReplies(true)">Select All Visible</button><button class="btn btn-outline" onclick="selectVisibleNoReplies(false)">Clear Visible</button><button class="btn btn-primary" onclick="readdNoReplies()">Re-add Selected</button><span class="assign-count" id="no-reply-count">0 selected</span></div><div class="lead-picker" style="max-height:520px">'+rows+'</div>';
  updateNoReplyCount();
}
function renderDetail(){
  var c=campaigns.find(x=>x.id===selectedId);
  if(!c){document.getElementById('detail').innerHTML='<div class="mutedbox">Select or create a campaign.</div>';return}
  if(activeTab==='no-replies'){renderNoReplies(c);return}
  var steps=messages.filter(m=>m.campaign_id===c.id).sort((a,b)=>a.step_number-b.step_number);
  var assigned=stageFilteredLeads().filter(l=>l.campaign_id===c.id);
  var assignLeads=filteredAssignLeads();
  var leadRows=assignLeads.map(l=>'<label class="lead-pick-row"><input type="checkbox" class="assign-lead-check" value="'+l.id+'" onchange="updateAssignCount()"><span><span class="lead-pick-title">#'+esc(l.lead_code||l.id)+' — '+esc(l.customer_name||'Unknown')+'</span><span class="lead-pick-meta"> '+esc([l.source,l.customer_phone,l.customer_email].filter(Boolean).join(' · '))+(l.campaign_completed?' · Campaign Completed':(l.campaign_id?' · currently in '+esc(l.campaign_name||((campaigns.find(c=>c.id===l.campaign_id)||{}).name)||'another campaign'):' · No Campaign Assigned'))+'</span></span></label>').join('')||'<div class="mutedbox">No loaded leads available for this filter.</div>';
  document.getElementById('detail').innerHTML=tabHtml()+'<div class="form-row"><div class="form-group"><label>Campaign Name</label><input id="c-name" value="'+esc(c.name)+'"></div><div class="form-group"><label>Source</label><select id="c-source">'+sourceOptions(c.source||'')+'</select></div></div><div class="form-group"><label>Description</label><input id="c-desc" value="'+esc(c.description||'')+'"></div><div class="form-row"><div class="form-group"><label>Email Sender Name</label><input id="c-sender-name" value="'+esc(c.sender_name||'')+'" placeholder="Scott"></div><div class="form-group"><label>Email Sender Address</label><input id="c-sender-email" value="'+esc(c.sender_email||'')+'" placeholder="pnmfencing@homecrafter.ai"></div></div><div class="form-group"><label>Email Reply-To Address</label><input id="c-reply-to" value="'+esc(c.reply_to_email||'')+'" placeholder="Same as sender"></div><div style="display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem"><label class="small"><input type="checkbox" id="c-active" '+(c.is_active?'checked':'')+'> Active</label><label class="small"><input type="checkbox" id="c-default" '+(c.is_default?'checked':'')+'> Default for source</label><button class="btn btn-primary" onclick="saveCampaign('+c.id+')">Save Campaign</button><button class="btn btn-outline" onclick="addStep('+c.id+')">+ Add Message</button></div><div class="mutedbox">Timing is by day number from campaign start. Day 0 sends immediately. Email follows SMS by about 5 minutes when channel is Both.</div><div class="steps">'+steps.map(stepHtml).join('')+'</div><div style="margin-top:1.25rem;border-top:1px solid var(--cream-dark);padding-top:1rem"><h3 style="font-family:Cormorant Garamond,serif;color:var(--midnight);font-size:1.35rem">Assign Leads</h3><div class="small" style="margin:.2rem 0 .35rem">Filter by lifecycle stage. Use All to show every stage, or select one/multiple stages.</div>'+stageFilterTabs()+assignCampaignFilterTabs()+'<div class="form-group"><label>Search / Select Multiple Leads</label><input id="assign-search" placeholder="Search by name, ID, source, phone, or email..." oninput="filterAssignLeads()"><div class="assign-actions"><button class="btn btn-outline" onclick="selectVisibleAssignLeads(true)">Select Visible</button><button class="btn btn-outline" onclick="selectVisibleAssignLeads(false)">Clear Visible</button><span class="assign-count" id="assign-count">0 selected</span></div>'+loadedAssignCountNotice(assignLeads.length)+'<div class="lead-picker" id="lead-picker">'+leadRows+'</div></div><button class="btn btn-primary" onclick="assignLead('+c.id+')">Assign Selected to Campaign</button><table class="lead-table"><tr><th>Lead</th><th>Source</th><th>Step</th><th>Status</th><th></th></tr>'+assigned.map(l=>'<tr><td>#'+esc(l.lead_code||l.id)+' — '+esc(l.customer_name||'Unknown')+'</td><td>'+esc(l.source||'')+'</td><td>'+esc(l.outreach_count||0)+'</td><td>'+(l.customer_responded?'Responded':l.outreach_paused?'Paused':esc(l.status))+'</td><td><button class="btn btn-outline" onclick="unassignLead('+l.id+')">Remove</button></td></tr>').join('')+'</table></div>';
  updateAssignCount();
}
function stepHtml(s){return '<div class="step"><div class="step-head"><div class="step-title">Message #'+s.step_number+'</div><div style="display:flex;gap:.45rem;align-items:center"><span class="small">Day</span><input id="day-'+s.id+'" type="number" min="0" value="'+s.send_day+'" style="width:70px;padding:.35rem;border:1px solid #ddd;border-radius:8px"><select id="channel-'+s.id+'" style="padding:.38rem;border:1px solid #ddd;border-radius:8px"><option value="both" '+(s.channel==='both'?'selected':'')+'>Both</option><option value="sms" '+(s.channel==='sms'?'selected':'')+'>SMS only</option><option value="email" '+(s.channel==='email'?'selected':'')+'>Email only</option></select><label class="small"><input id="active-'+s.id+'" type="checkbox" '+(s.is_active?'checked':'')+'> Active</label></div></div><div class="form-group"><label>SMS Body</label><textarea id="sms-'+s.id+'">'+esc(s.sms_body||'')+'</textarea></div><div class="form-group"><label>Email Subject</label><input id="subject-'+s.id+'" value="'+esc(s.email_subject||'')+'"></div><div class="form-group"><label>Email Body</label><textarea id="email-'+s.id+'">'+esc(s.email_body||'')+'</textarea></div><div style="display:flex;gap:.5rem;justify-content:flex-end"><button class="btn btn-outline" onclick="deleteStep('+s.id+')">Delete</button><button class="btn btn-primary" onclick="saveStep('+s.campaign_id+','+s.step_number+','+s.id+')">Save Message</button></div></div>'}
function post(body){return fetch('/api/campaigns',api('POST',body)).then(r=>r.json()).then(d=>{if(d.error)alert(d.error);load();return d})}
function newCampaign(){var name=prompt('Campaign name?');if(name)post({action:'create_campaign',name:name,source:'angi',description:''})}
function saveCampaign(id){post({action:'update_campaign',id:id,name:document.getElementById('c-name').value,description:document.getElementById('c-desc').value,source:document.getElementById('c-source').value,sender_name:document.getElementById('c-sender-name').value,sender_email:document.getElementById('c-sender-email').value,reply_to_email:document.getElementById('c-reply-to').value,is_active:document.getElementById('c-active').checked,is_default:document.getElementById('c-default').checked})}
function saveStep(campaignId,stepNumber,id){post({action:'upsert_message',campaign_id:campaignId,step_number:stepNumber,send_day:Number(document.getElementById('day-'+id).value||0),channel:document.getElementById('channel-'+id).value,sms_body:document.getElementById('sms-'+id).value,email_subject:document.getElementById('subject-'+id).value,email_body:document.getElementById('email-'+id).value,is_active:document.getElementById('active-'+id).checked})}
function addStep(campaignId){var existing=messages.filter(m=>m.campaign_id===campaignId).map(m=>m.step_number);var next=existing.length?Math.max.apply(null,existing)+1:1;post({action:'upsert_message',campaign_id:campaignId,step_number:next,send_day:0,channel:'both',sms_body:'',email_subject:'Following up',email_body:'',is_active:true})}
function deleteStep(id){if(confirm('Delete this campaign message?'))post({action:'delete_message',id:id})}
function checkedAssignBoxes(){return Array.from(document.querySelectorAll('.assign-lead-check')).filter(cb=>cb.checked)}
function updateAssignCount(){var el=document.getElementById('assign-count');if(el)el.textContent=checkedAssignBoxes().length+' selected'}
function filterAssignLeads(){var q=(document.getElementById('assign-search').value||'').toLowerCase();document.querySelectorAll('.lead-pick-row').forEach(row=>{row.style.display=row.textContent.toLowerCase().indexOf(q)>=0?'flex':'none'});updateAssignCount()}
function selectVisibleAssignLeads(on){document.querySelectorAll('.lead-pick-row').forEach(row=>{if(row.style.display==='none')return;var cb=row.querySelector('input');if(cb)cb.checked=on});updateAssignCount()}
function assignLead(campaignId){var ids=checkedAssignBoxes().map(cb=>Number(cb.value)).filter(Boolean);if(!ids.length){alert('Select one or more leads first.');return}post({action:'bulk_assign',lead_ids:ids,campaign_id:campaignId})}
function unassignLead(leadId){post({action:'assign_lead',lead_id:leadId,campaign_id:null})}
function checkedNoReplyBoxes(){return Array.from(document.querySelectorAll('.no-reply-check')).filter(cb=>cb.checked)}
function updateNoReplyCount(){var el=document.getElementById('no-reply-count');if(el)el.textContent=checkedNoReplyBoxes().length+' selected'}
function filterNoReplies(){var q=(document.getElementById('no-reply-search').value||'').toLowerCase();document.querySelectorAll('.no-reply-row').forEach(row=>{row.style.display=row.textContent.toLowerCase().indexOf(q)>=0?'flex':'none'});updateNoReplyCount()}
function selectVisibleNoReplies(on){document.querySelectorAll('.no-reply-row').forEach(row=>{if(row.style.display==='none')return;var cb=row.querySelector('input');if(cb)cb.checked=on});updateNoReplyCount()}
function readdNoReplies(){var ids=checkedNoReplyBoxes().map(cb=>Number(cb.value)).filter(Boolean);var campaignId=Number((document.getElementById('readd-campaign')||{}).value||0);if(!ids.length){alert('Select one or more no-reply leads first.');return}if(!campaignId){alert('Choose a campaign to re-add them to.');return}if(!confirm('Re-add '+ids.length+' lead(s) to this campaign and restart their sequence?'))return;post({action:'bulk_assign',lead_ids:ids,campaign_id:campaignId})}
load();
</script>
</body>
</html>
