<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Login — HomeCrafter</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', sans-serif; background: #faf9f6; color: #2a2a2a; min-height: 100vh; display: flex; flex-direction: column; }

.hero {
  background: linear-gradient(175deg, #0c0a1a 0%, #171330 30%, #1e1845 55%, #2a2260 80%, #3d3480 100%);
  color: white; text-align: center; padding: 48px 24px 40px; position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 40% 15%, rgba(255,255,255,0.35), transparent),
    radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1.5px 1.5px at 50% 5%, rgba(255,215,100,0.5), transparent);
}
.hero-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px; font-weight: 600; letter-spacing: 8px; position: relative;
  background: linear-gradient(180deg, #fff 20%, #d4c394 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-decoration: none; display: inline-block;
}
.hero-sub { font-size: 10px; font-weight: 600; letter-spacing: 5px; text-transform: uppercase; color: rgba(212,195,148,0.6); margin-top: 8px; position: relative; }
.gold-trim { height: 1px; background: linear-gradient(90deg, transparent 5%, #c4aa6a 50%, transparent 95%); }

.login-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
.login-card {
  width: 100%; max-width: 400px; background: white; border: 1px solid #eae7e1;
  border-radius: 4px; padding: 44px 36px; text-align: center;
}
.login-card h2 {
  font-family: 'Cormorant Garamond', serif; font-size: 28px; color: #1e1845;
  font-weight: 500; margin-bottom: 6px;
}
.login-card .subtitle { font-size: 12px; color: #b8b0a4; margin-bottom: 32px; font-weight: 500; letter-spacing: 0.5px; }

.field { margin-bottom: 18px; text-align: left; }
.field label {
  display: block; font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 3px; color: #c4aa6a; margin-bottom: 8px;
}
.field input {
  width: 100%; padding: 14px 18px; border: 1px solid #eae7e1; border-radius: 4px;
  font-size: 14px; font-family: 'Montserrat', sans-serif; font-weight: 400;
  background: #faf9f6; transition: all 0.3s;
}
.field input:focus { outline: none; border-color: #c4aa6a; box-shadow: 0 0 0 3px rgba(196,170,106,0.08); }

.login-btn {
  width: 100%; padding: 16px; border: none; border-radius: 4px;
  font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; letter-spacing: 3px; text-transform: uppercase;
  background: #1e1845; color: #d4c394; transition: all 0.35s; margin-top: 8px;
}
.login-btn:hover { background: #2a2260; box-shadow: 0 8px 32px rgba(30,24,69,0.2); transform: translateY(-1px); }

.error-msg { color: #a0522d; font-size: 12px; margin-top: 12px; display: none; font-weight: 600; letter-spacing: 0.5px; }
.success-msg { color: #237a3b; font-size: 12px; margin-top: 12px; display: none; font-weight: 600; letter-spacing: 0.5px; line-height: 1.5; }
.hidden { display: none; }
.contact-link { margin-top: 24px; font-size: 12px; color: #b8b0a4; }
.contact-link a { color: #c4aa6a; text-decoration: none; font-weight: 600; }
.contact-link a:hover { text-decoration: underline; }

.footer { text-align: center; padding: 24px 20px; }
.footer p { font-size: 10px; color: #c8c0b4; letter-spacing: 1px; font-weight: 500; }
.footer a { color: #b8ae9e; text-decoration: none; }

@media (max-width: 500px) {
  .hero-logo { font-size: clamp(24px, 7vw, 36px); letter-spacing: 4px; }
  .login-card { padding: 32px 24px; }
}

.portal-home { position: fixed; top: 0.85rem; left: 0.9rem; width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid rgba(196,170,106,0.35); border-radius: 999px; color: #c4aa6a; text-decoration: none; font-size: 1rem; background: rgba(30,24,69,0.72); transition: all 0.2s; z-index: 9999; backdrop-filter: blur(6px); }
.portal-home:hover { background: rgba(196,170,106,0.18); transform: translateY(-1px); }
@media (max-width: 640px) { .portal-home { top: 0.7rem; left: 0.7rem; width: 30px; height: 30px; font-size: 0.9rem; } }
</style>
</head>
<body>
<a class="portal-home" href="/pro-dashboard.html" title="Portal home" aria-label="Portal home">&#8962;</a>

<div class="hero">
  <a href="/services.html" class="hero-logo">HOMECRAFTER</a>
  <div class="hero-sub">◆ &nbsp; Pro Portal &nbsp; ◆</div>
</div>
<div class="gold-trim"></div>

<div class="login-wrap">
  <div class="login-card">
    <h2>Welcome Back</h2>
    <div class="subtitle">Sign in to your pro account</div>
    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@company.com" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin:12px 0 4px">
        <input type="checkbox" id="rememberMe" style="width:16px;height:16px;accent-color:#1e1845;cursor:pointer">
        <label for="rememberMe" style="font-size:12px;color:#6b6b6b;font-weight:500;cursor:pointer;text-transform:none;letter-spacing:0">Remember me</label>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
      <div class="error-msg" id="errorMsg"></div>
      <div style="margin-top:16px"><a href="#" onclick="showForgot(event)" style="font-size:11px;color:#b8b0a4;text-decoration:none;font-weight:500;">Forgot password?</a></div>
    </form>

    <form id="forgotForm" class="hidden">
      <div class="field">
        <label>Email</label>
        <input type="email" id="resetEmail" placeholder="you@company.com" required>
      </div>
      <button type="submit" class="login-btn" id="forgotBtn">Send Reset Link</button>
      <div class="error-msg" id="forgotError"></div>
      <div class="success-msg" id="forgotSuccess"></div>
      <div style="margin-top:16px"><a href="#" onclick="showLogin(event)" style="font-size:11px;color:#b8b0a4;text-decoration:none;font-weight:500;">Back to sign in</a></div>
    </form>

    <form id="resetForm" class="hidden">
      <div class="field">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="At least 10 characters" required minlength="10">
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="10">
      </div>
      <button type="submit" class="login-btn" id="resetBtn">Change Password</button>
      <div class="error-msg" id="resetError"></div>
      <div class="success-msg" id="resetSuccess"></div>
    </form>
    <div class="contact-link" id="signupLink">Don't have an account? <a href="/pro-signup.html">Create one</a></div>
  </div>
</div>

<div class="footer">
  <p><a href="/services.html">homecrafter.ai</a></p>
  <div class="footer-text" style="margin-top:6px;font-size:0.6rem;color:rgba(107,107,107,0.5)">Owned and operated by Fence Crafters LLC</div>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var resetToken = params.get('reset') || '';

function setInlineMessage(el, text) {
  el.textContent = text;
  el.style.display = text ? 'block' : 'none';
}

function showOnly(formId) {
  document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('forgotForm').classList.add('hidden');
  document.getElementById('resetForm').classList.add('hidden');
  document.getElementById('signupLink').style.display = formId === 'loginForm' ? 'block' : 'none';
  document.getElementById(formId).classList.remove('hidden');
}

function showForgot(e) {
  if (e) e.preventDefault();
  document.getElementById('resetEmail').value = document.getElementById('email').value || localStorage.getItem('hc_remember_email') || '';
  showOnly('forgotForm');
}

function showLogin(e) {
  if (e) e.preventDefault();
  showOnly('loginForm');
}

// Pre-fill remembered email
(function() {
  var saved = localStorage.getItem('hc_remember_email');
  var resetEmail = params.get('email') || '';
  if (saved) {
    document.getElementById('email').value = saved;
    document.getElementById('rememberMe').checked = true;
  }
  if (resetEmail) {
    document.getElementById('email').value = resetEmail;
    document.getElementById('resetEmail').value = resetEmail;
  }
  if (resetToken) showOnly('resetForm');
})();

// Redirect if already logged in with valid session, except when changing password
(async () => {
  if (resetToken) return;
  const token = localStorage.getItem('hc_pro_token');
  if (!token) return;
  try {
    const res = await fetch('/api/pro-session', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
    const data = await res.json();
    if (data.valid) {
      const redir = new URLSearchParams(window.location.search).get('redirect');
      window.location.href = redir || '/pro-dashboard.html';
    }
    else { localStorage.removeItem('hc_pro_token'); localStorage.removeItem('hc_pro_name'); }
  } catch {}
})();

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('errorMsg');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const remember = document.getElementById('rememberMe').checked;

  btn.disabled = true; btn.textContent = 'Signing in...';
  errEl.style.display = 'none';

  try {
    const res = await fetch('/api/pro-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, remember })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('hc_pro_token', data.token);
      localStorage.setItem('hc_pro_name', data.name);
      if (remember) {
        localStorage.setItem('hc_remember_email', email);
      } else {
        localStorage.removeItem('hc_remember_email');
      }
      const redir = new URLSearchParams(window.location.search).get('redirect');
      window.location.href = redir || '/pro-dashboard.html';
    } else {
      errEl.textContent = data.message || 'Invalid credentials';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  } catch(err) {
    errEl.textContent = 'Unable to connect. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
});

document.getElementById('forgotForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('forgotBtn');
  const errEl = document.getElementById('forgotError');
  const successEl = document.getElementById('forgotSuccess');
  btn.disabled = true; btn.textContent = 'Sending...';
  setInlineMessage(errEl, '');
  setInlineMessage(successEl, '');

  try {
    const res = await fetch('/api/pro-password-reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'request_reset', email: document.getElementById('resetEmail').value })
    });
    if (!res.ok) throw new Error('Request failed');
    setInlineMessage(successEl, 'If that email is on file, a reset link has been sent. It expires in 30 minutes.');
  } catch(err) {
    setInlineMessage(errEl, 'Could not send reset email. Please try again.');
  }
  btn.disabled = false; btn.textContent = 'Send Reset Link';
});

document.getElementById('resetForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('resetBtn');
  const errEl = document.getElementById('resetError');
  const successEl = document.getElementById('resetSuccess');
  const password = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  setInlineMessage(errEl, '');
  setInlineMessage(successEl, '');

  if (password !== confirm) {
    setInlineMessage(errEl, 'Passwords do not match.');
    return;
  }

  btn.disabled = true; btn.textContent = 'Changing...';
  try {
    const res = await fetch('/api/pro-password-reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'reset_password', token: resetToken, password: password })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      localStorage.removeItem('hc_pro_token');
      localStorage.removeItem('hc_pro_name');
      window.history.replaceState({}, document.title, '/pro-login.html');
      resetToken = '';
      showOnly('loginForm');
      setInlineMessage(document.getElementById('errorMsg'), '');
      alert('Password changed. You can sign in with the new password now.');
    } else {
      setInlineMessage(errEl, data.message || 'Could not reset password.');
    }
  } catch(err) {
    setInlineMessage(errEl, 'Unable to connect. Please try again.');
  }
  btn.disabled = false; btn.textContent = 'Change Password';
});
</script>

</body>
</html>
